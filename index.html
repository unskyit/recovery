<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYR PDF & ZIP Password Recovery Tool</title>
    <meta name="description" content="A client-side, ultra-fast PDF and ZIP password recovery and decryption engine running entirely in your browser.">
    
    <style>
        /* Ultra-Flat, Modern, High-Contrast UI */
        :root {
            --bg-base: #0a0a0a; 
            --bg-surface: #141414; 
            --bg-input: #1f1f1f;
            --text-main: #f5f5f5; 
            --text-muted: #888888;
            --primary: #3b82f6; /* Calm Blue */
            --primary-hover: #2563eb; 
            --success: #10b981; 
            --error: #ef4444; 
            --border: #262626; 
            --log-bg: #000000;
        }

        [data-theme="light"] {
            --bg-base: #f9fafb; 
            --bg-surface: #ffffff; 
            --bg-input: #f3f4f6;
            --text-main: #111827; 
            --text-muted: #6b7280;
            --primary: #2563eb; 
            --primary-hover: #1d4ed8;
            --success: #059669; 
            --error: #dc2626; 
            --border: #e5e7eb; 
            --log-bg: #f9fafb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-base); 
            color: var(--text-main); 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 1rem; 
            line-height: 1.5; 
            font-size: 14px;
            transition: background 0.2s ease, color 0.2s ease; 
        }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
        h1 { font-weight: 600; font-size: 1.1rem; letter-spacing: -0.02em; display: flex; align-items: center; gap: 8px; }
        .badge { background: var(--border); color: var(--text-muted); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; }
        
        .theme-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; transition: 0.2s; }
        .theme-btn:hover { background: var(--bg-surface); color: var(--text-main); }
        
        /* Main Panels */
        .card { background: var(--bg-surface); border-radius: 12px; border: 1px solid var(--border); padding: 1.25rem; margin-bottom: 1rem; }
        
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: 500; margin-bottom: 6px; color: var(--text-main); font-size: 13px; }
        input[type="file"] { width: 100%; padding: 8px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); font-size: 13px; outline: none; }
        
        /* Toggle Switch */
        .toggle-container { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-top: 1px solid var(--border); margin-top: 5px; }
        .toggle-text { display: flex; flex-direction: column; }
        .toggle-title { font-weight: 500; font-size: 13px; }
        .toggle-desc { font-size: 11px; color: var(--text-muted); }
        
        .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: .2s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .2s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Button */
        .start-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 500; width: 100%; font-size: 13px; letter-spacing: 0.2px; margin-top: 10px; transition: background 0.2s; }
        .start-btn:disabled { background: var(--bg-input); color: var(--text-muted); cursor: not-allowed; }
        
        /* HUD & Logs */
        #liveHud { background: var(--bg-surface); padding: 10px 12px; border-radius: 8px; margin-bottom: 1rem; border-left: 3px solid var(--primary); font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px; display: none; border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); color: var(--text-muted); }

        .log-grid { display: flex; flex-direction: column; gap: 1rem; }
        @media (min-width: 600px) { .log-grid { flex-direction: row; } .log-grid > div { flex: 1; } }

        .log-box { background: var(--log-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; height: 220px; overflow-y: auto; font-family: 'SFMono-Regular', Consolas, monospace; font-size: 11px; white-space: pre-wrap; line-height: 1.6; }
        .log-header { font-weight: 500; margin-bottom: 8px; display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        /* Typography Colors */
        .t-success { color: var(--success); } .t-error { color: var(--error); } .t-primary { color: var(--primary); } .t-muted { color: var(--text-muted); }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@zip.js/zip.js@2.4.26/dist/zip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>

    <div class="header">
        <h1>MYR Recovery Engine <span class="badge" id="batchBadge">V9</span></h1>
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">Light Mode</button>
    </div>

    <div class="card">
        <div class="form-group">
            <label>Password Dictionary (.txt)</label>
            <input type="file" id="dictFile" accept=".txt">
        </div>
        <div class="form-group">
            <label>Encrypted Targets (.pdf, .zip)</label>
            <input type="file" id="files" multiple accept=".pdf,.zip">
        </div>
        
        <div class="toggle-container">
            <div class="toggle-text">
                <span class="toggle-title">Auto-Decrypt & Save</span>
                <span class="toggle-desc">Automatically strips password and downloads a clean copy (filename_unlocked)</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="autoSaveToggle" checked>
                <span class="slider"></span>
            </label>
        </div>

        <button id="startBtn" class="start-btn">Start Recovery Process</button>
    </div>

    <div id="liveHud">Status: Idle</div>

    <div class="log-grid">
        <div>
            <span class="log-header">Activity Log</span>
            <div id="logActivity" class="log-box t-muted"></div>
        </div>
        <div>
            <span class="log-header">Recovered Data</span>
            <div id="logSuccess" class="log-box t-success"></div>
        </div>
    </div>

    <script>
        // Engine Settings
        const CORES = navigator.hardwareConcurrency || 4;
        const BATCH_SIZE = Math.max(CORES * 2, 8); 
        document.getElementById('batchBadge').textContent = `V9 • ${BATCH_SIZE}x Parallel`;

        // Theme Toggle
        function toggleTheme() {
            const html = document.documentElement; const btn = document.getElementById('themeBtn');
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            btn.textContent = isDark ? 'Dark Mode' : 'Light Mode';
        }

        // UI Helpers
        const UI = {
            btn: document.getElementById('startBtn'),
            hud: document.getElementById('liveHud'),
            act: document.getElementById('logActivity'),
            suc: document.getElementById('logSuccess'),
            toggle: document.getElementById('autoSaveToggle')
        };

        const logMsg = (msg, type = 't-muted', box = 'act') => {
            const el = document.createElement('span'); el.className = type; el.textContent = msg + '\n';
            UI[box].appendChild(el); UI[box].scrollTop = UI[box].scrollHeight;
        };

        const downloadBlob = (blob, filename) => {
            const url = URL.createObjectURL(blob); const a = document.createElement('a');
            a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
        };

        let lastUpdate = 0;
        const yieldUI = () => new Promise(r => setTimeout(r, 0));
        const updateHud = async (msg, force = false) => {
            if (force || Date.now() - lastUpdate > 35) {
                UI.hud.textContent = msg; lastUpdate = Date.now(); await yieldUI();
            }
        };

        // Initialize PDF Worker
        async function initPdfWorker() {
            await updateHud('Initializing native background workers...', true);
            const res = await fetch('https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js');
            const blob = await res.blob();
            pdfjsLib.GlobalWorkerOptions.workerSrc = URL.createObjectURL(blob);
        }

        // Load Dictionary
        async function loadDictionary(file) {
            const stream = file.stream(); const reader = stream.getReader(); const decoder = new TextDecoder('utf-8');
            let rem = ''; const passes = [];
            while (true) {
                const { done, value } = await reader.read(); if (done) break;
                const chunk = decoder.decode(value, { stream: true });
                const parts = (rem + chunk).split(/\s+/); rem = parts.pop(); passes.push(...parts.filter(Boolean));
            }
            if (rem) passes.push(rem); return passes;
        }

        // --- Core Async Engine ---
        async function processPDF(file, allPasswords) {
            const fileUrl = URL.createObjectURL(file);
            try {
                try {
                    const test = await pdfjsLib.getDocument({ url: fileUrl }).promise;
                    await test.destroy(); return 'UNENCRYPTED';
                } catch (e) { if (e.name !== 'PasswordException') throw e; }

                for (let i = 0; i < allPasswords.length; i += BATCH_SIZE) {
                    const batch = allPasswords.slice(i, i + BATCH_SIZE);
                    await updateHud(`[${file.name}] Scanning: ${i} to ${i + batch.length} of ${allPasswords.length}`);
                    
                    const promises = batch.map(async (pwd) => {
                        const task = pdfjsLib.getDocument({ url: fileUrl, password: pwd });
                        try {
                            const doc = await task.promise;
                            await doc.destroy(); return pwd;
                        } catch (err) {
                            if (task.destroy) task.destroy().catch(()=>{});
                            if (err.name === 'PasswordException') return null;
                            throw err;
                        }
                    });

                    const results = await Promise.all(promises);
                    const found = results.find(result => result !== null);
                    if (found) return found;
                }
            } finally { URL.revokeObjectURL(fileUrl); }
            return null;
        }

        async function processZIP(file, allPasswords) {
            let zipR;
            try {
                zipR = new zip.ZipReader(new zip.BlobReader(file));
                const entries = await zipR.getEntries();
                if (!entries.length) return 'EMPTY';
                const target = entries.find(e => e.encrypted) || entries[0];
                if (!target.encrypted) return 'UNENCRYPTED';

                for (let i = 0; i < allPasswords.length; i += BATCH_SIZE) {
                    const batch = allPasswords.slice(i, i + BATCH_SIZE);
                    await updateHud(`[${file.name}] Scanning: ${i} to ${i + batch.length} of ${allPasswords.length}`);
                    
                    const promises = batch.map(async (pwd) => {
                        try { await target.getData(new zip.BlobWriter(), { password: pwd }); return pwd; } 
                        catch (err) { return null; }
                    });

                    const results = await Promise.all(promises);
                    const found = results.find(result => result !== null);
                    if (found) return found;
                }
            } finally { if (zipR) await zipR.close(); }
            return null;
        }

        // --- Unlock & Save ---
        async function attemptSave(file, ext, pwd) {
            try {
                const newName = file.name.replace(new RegExp(`\\.${ext}$`, 'i'), `_unlocked.${ext}`);
                if (ext === 'pdf') {
                    const doc = await PDFLib.PDFDocument.load(await file.arrayBuffer(), { password: pwd });
                    downloadBlob(new Blob([await doc.save()], { type: 'application/pdf' }), newName);
                } else if (ext === 'zip') {
                    const zipR = new zip.ZipReader(new zip.BlobReader(file));
                    const writer = new zip.BlobWriter("application/zip"); const zipW = new zip.ZipWriter(writer);
                    for (const entry of await zipR.getEntries()) {
                        if (entry.directory) await zipW.add(entry.filename, null, { directory: true });
                        else await zipW.add(entry.filename, new zip.BlobReader(await entry.getData(new zip.BlobWriter(), { password: pwd })));
                    }
                    await zipR.close(); await zipW.close(); downloadBlob(await writer.getData(), newName);
                }
                logMsg(`  ↳ Saved locally as: ${newName}`, 't-success');
            } catch (err) {
                if (err.message.includes('encrypted')) logMsg(`  ↳ Save Skipped: Advanced AES-256 detected. Use native print-to-PDF trick.`, 't-primary');
                else logMsg(`  ↳ Save Error: ${err.message}`, 't-error');
            }
        }

        // --- Main Execution ---
        UI.btn.addEventListener('click', async () => {
            const dict = document.getElementById('dictFile').files[0]; const files = document.getElementById('files').files;
            if (!dict || !files.length) return alert('Dictionary and target files are required.');
            
            UI.btn.disabled = true; UI.hud.style.display = 'block'; UI.act.innerHTML = ''; UI.suc.innerHTML = '';
            const autoSaveEnabled = UI.toggle.checked;
            
            try {
                logMsg(`> Engine Started (Parallel Mode)`, 't-primary');
                UI.hud.textContent = "Loading Dictionary...";
                await initPdfWorker();
                
                const passes = await loadDictionary(dict); 
                if (!passes.length) throw new Error("Dictionary empty.");
                logMsg(`> Dictionary Indexed: ${passes.length} keys.\n`);

                for (let i = 0; i < files.length; i++) {
                    const file = files[i]; const ext = file.name.split('.').pop().toLowerCase();
                    logMsg(`Processing [${i+1}/${files.length}]: ${file.name}`);
                    if (ext !== 'pdf' && ext !== 'zip') { logMsg(`  ↳ Skipped: Unsupported file.`, 't-error'); continue; }

                    const pwd = ext === 'pdf' ? await processPDF(file, passes) : await processZIP(file, passes);

                    if (pwd === 'UNENCRYPTED' || pwd === 'EMPTY') { 
                        logMsg(`  ↳ Notice: File is unencrypted or empty.`, 't-muted'); 
                    } else if (pwd) {
                        logMsg(`  ↳ Match Found: ${pwd}`, 't-success');
                        logMsg(`${file.name}\nPass: ${pwd}\n`, 't-success', 'suc');
                        
                        if (autoSaveEnabled) {
                            await attemptSave(file, ext, pwd);
                        } else {
                            logMsg(`  ↳ Auto-save bypassed by user.`, 't-muted');
                        }
                    } else { 
                        logMsg(`  ↳ Failed: Password not found in dictionary.`, 't-error'); 
                    }
                }
                UI.hud.textContent = 'Status: Complete'; 
                logMsg('\n> Batch Process Complete', 't-primary');
            } catch (err) {
                logMsg(`> CRITICAL ERROR: ${err.message}`, 't-error'); 
                UI.hud.textContent = 'Status: Error Halted'; 
            } finally { 
                UI.btn.disabled = false; 
                UI.btn.textContent = 'Start New Batch'; 
            }
        });
    </script>
</body>
</html>

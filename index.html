<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lifelong Recovery Engine v6</title>
    <style>
        /* Immutable Calm Blue Theme */
        :root {
            --bg-base: #0f172a; --bg-surface: #1e293b; --bg-input: #0b1120;
            --text-main: #f1f5f9; --text-muted: #94a3b8;
            --primary: #3b82f6; --primary-hover: #2563eb;
            --success: #10b981; --error: #ef4444; --warning: #f59e0b;
            --border: #334155; --log-bg: #020617;
        }

        [data-theme="light"] {
            --bg-base: #f8fafc; --bg-surface: #ffffff; --bg-input: #f1f5f9;
            --text-main: #0f172a; --text-muted: #64748b;
            --primary: #2563eb; --primary-hover: #1d4ed8;
            --success: #059669; --error: #dc2626; --warning: #d97706;
            --border: #cbd5e1; --log-bg: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-base); color: var(--text-main);
            max-width: 1200px; margin: 0 auto; padding: 1.5rem; line-height: 1.5;
            transition: all 0.3s ease;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        h2 { font-weight: 600; font-size: 1.25rem; display: flex; align-items: center; gap: 10px; }
        .version-badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; letter-spacing: 1px;}
        
        .theme-btn {
            background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-main);
            padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500;
        }

        .panel { background: var(--bg-surface); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        input[type="file"] { width: 100%; padding: 0.75rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); margin-bottom: 1.25rem; }
        
        .start-btn {
            background: var(--primary); color: white; border: none; padding: 1rem; border-radius: 8px;
            cursor: pointer; font-weight: 600; width: 100%; text-transform: uppercase; letter-spacing: 1px;
            transition: transform 0.1s, background 0.2s;
        }
        .start-btn:active { transform: scale(0.98); }
        .start-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; transform: none; }

        #liveHud { background: var(--bg-surface); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; border-left: 4px solid var(--primary); font-family: monospace; font-size: 0.9rem; display: none; }

        .log-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 768px) { .log-grid { grid-template-columns: 1fr 1fr; } }

        .log-box { background: var(--log-bg); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; height: 400px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; white-space: pre-wrap; }
        .log-title { font-weight: 600; margin-bottom: 0.75rem; display: block; font-size: 0.85rem; letter-spacing: 0.5px; }

        .t-success { color: var(--success); } .t-error { color: var(--error); } .t-info { color: var(--primary); } .t-warn { color: var(--warning); } .t-muted { color: var(--text-muted); }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@zip.js/zip.js@2.4.26/dist/zip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>

    <div class="header">
        <h2>Recovery Engine <span class="version-badge">v6 LIFELONG</span></h2>
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️ Light</button>
    </div>

    <div class="panel">
        <label>1. Password Dictionary (.txt)</label>
        <input type="file" id="dictFile" accept=".txt">
        <label>2. Target Batches (.pdf, .zip)</label>
        <input type="file" id="files" multiple accept=".pdf,.zip">
        <button id="startBtn" class="start-btn">Initialize Extraction</button>
    </div>

    <div id="liveHud">Awaiting input...</div>

    <div class="log-grid">
        <div>
            <span class="log-title t-info">LIVE TERMINAL</span>
            <div id="logActivity" class="log-box t-muted"></div>
        </div>
        <div>
            <span class="log-title t-success">RECOVERED SECRETS</span>
            <div id="logSuccess" class="log-box t-success"></div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement; const btn = document.getElementById('themeBtn');
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            btn.textContent = isDark ? '🌙 Dark' : '☀️ Light';
        }

        const UI = {
            btn: document.getElementById('startBtn'),
            hud: document.getElementById('liveHud'),
            act: document.getElementById('logActivity'),
            suc: document.getElementById('logSuccess')
        };

        let lastUpdate = 0; const yieldUI = () => new Promise(r => setTimeout(r, 0));

        const updateHud = async (msg, color = 'var(--primary)', force = false) => {
            if (force || Date.now() - lastUpdate > 30) {
                UI.hud.textContent = msg; UI.hud.style.borderLeftColor = color;
                lastUpdate = Date.now(); await yieldUI();
            }
        };

        const logMsg = (msg, type = 't-muted', box = 'act') => {
            const el = document.createElement('span'); el.className = type; el.textContent = msg + '\n';
            UI[box].appendChild(el); UI[box].scrollTop = UI[box].scrollHeight;
        };

        const downloadBlob = (blob, filename) => {
            const url = URL.createObjectURL(blob); const a = document.createElement('a');
            a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
        };

        // Engine Setup (Updated fetch URL for background worker)
        async function initPdfWorker() {
            await updateHud('Loading background workers...', 'var(--warning)', true);
            const res = await fetch('https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js');
            const blob = await res.blob();
            pdfjsLib.GlobalWorkerOptions.workerSrc = URL.createObjectURL(blob);
        }

        async function loadDictionary(file) {
            const stream = file.stream(); const reader = stream.getReader(); const decoder = new TextDecoder('utf-8');
            let rem = ''; const passes = [];
            while (true) {
                const { done, value } = await reader.read(); if (done) break;
                const chunk = decoder.decode(value, { stream: true });
                const parts = (rem + chunk).split(/\s+/); rem = parts.pop(); passes.push(...parts.filter(Boolean));
                await updateHud(`Buffering ${passes.length} passwords...`, 'var(--info)');
            }
            if (rem) passes.push(rem); return passes;
        }

        // Logic Processors
        async function processFile(file, passwords, ext) {
            if (ext === 'pdf') {
                const url = URL.createObjectURL(file);
                try {
                    const test = await pdfjsLib.getDocument({ url }).promise.catch(e => { if (e.name !== 'PasswordException') throw e; });
                    if (test) { await test.destroy(); return 'UNENCRYPTED'; }
                    for (let i = 0; i < passwords.length; i++) {
                        const pwd = passwords[i]; await updateHud(`[${file.name}] Testing: ${pwd} (${i+1}/${passwords.length})`, 'var(--warning)');
                        const task = pdfjsLib.getDocument({ url, password: pwd });
                        try { const doc = await task.promise; await doc.destroy(); return pwd; } 
                        catch (e) { if (task.destroy) task.destroy().catch(()=>{}); if (e.name === 'PasswordException') continue; throw e; }
                    }
                } finally { URL.revokeObjectURL(url); }
            } else if (ext === 'zip') {
                let zipR;
                try {
                    zipR = new zip.ZipReader(new zip.BlobReader(file)); const entries = await zipR.getEntries();
                    if (!entries.length) return 'EMPTY'; const target = entries.find(e => e.encrypted) || entries[0];
                    if (!target.encrypted) return 'UNENCRYPTED';
                    for (let i = 0; i < passwords.length; i++) {
                        const pwd = passwords[i]; await updateHud(`[${file.name}] Testing: ${pwd} (${i+1}/${passwords.length})`, 'var(--warning)');
                        try { await target.getData(new zip.BlobWriter(), { password: pwd }); return pwd; } catch (e) { continue; }
                    }
                } finally { if (zipR) await zipR.close(); }
            }
            return null;
        }

        // Auto-Save Architecture
        async function attemptSave(file, ext, pwd) {
            try {
                const newName = file.name.replace(new RegExp(`\\.${ext}$`, 'i'), `_unlocked.${ext}`);
                if (ext === 'pdf') {
                    const doc = await PDFLib.PDFDocument.load(await file.arrayBuffer(), { password: pwd });
                    downloadBlob(new Blob([await doc.save()], { type: 'application/pdf' }), newName);
                } else if (ext === 'zip') {
                    const zipR = new zip.ZipReader(new zip.BlobReader(file));
                    const writer = new zip.BlobWriter("application/zip"); const zipW = new zip.ZipWriter(writer);
                    for (const entry of await zipR.getEntries()) {
                        if (entry.directory) await zipW.add(entry.filename, null, { directory: true });
                        else await zipW.add(entry.filename, new zip.BlobReader(await entry.getData(new zip.BlobWriter(), { password: pwd })));
                    }
                    await zipR.close(); await zipW.close(); downloadBlob(await writer.getData(), newName);
                }
                logMsg(`  [+] Auto-saved: ${newName}`, 't-success');
            } catch (err) {
                if (err.message.includes('encrypted')) logMsg(`  [!] Save Skipped: PDF uses Advanced AES. Must unlock manually with recovered password.`, 't-warn');
                else logMsg(`  [!] Save Error: ${err.message}`, 't-error');
            }
        }

        UI.btn.addEventListener('click', async () => {
            const dict = document.getElementById('dictFile').files[0]; const files = document.getElementById('files').files;
            if (!dict || !files.length) return alert('Dictionary and target files are required.');
            UI.btn.disabled = true; UI.hud.style.display = 'block'; UI.act.innerHTML = '';
            
            try {
                logMsg('=== LIFELONG ENGINE INITIATED ===', 't-warn'); await initPdfWorker();
                const passes = await loadDictionary(dict); if (!passes.length) throw new Error("Dictionary empty.");
                logMsg(`Dictionary Loaded: ${passes.length} keys.\n`);

                for (let i = 0; i < files.length; i++) {
                    const file = files[i]; const ext = file.name.split('.').pop().toLowerCase();
                    logMsg(`► Analyzing [${i+1}/${files.length}]: ${file.name}`, 't-info');
                    if (ext !== 'pdf' && ext !== 'zip') { logMsg(`  Skipped: Unsupported.`, 't-error'); continue; }

                    const pwd = await processFile(file, passes, ext);
                    if (pwd === 'UNENCRYPTED' || pwd === 'EMPTY') { logMsg(`  Notice: No lock / Empty.`, 't-warn'); }
                    else if (pwd) {
                        logMsg(`  Found Key: [ ${pwd} ]`, 't-success');
                        logMsg(`[FILE] ${file.name}\n[PASS] ${pwd}\n`, 't-success', 'suc');
                        await attemptSave(file, ext, pwd);
                    } else { logMsg(`  Failed: Dictionary exhausted.`, 't-error'); }
                    await yieldUI();
                }
                await updateHud('SYSTEM IDLE', 'var(--success)', true); logMsg('\n=== BATCH COMPLETE ===', 't-success');
            } catch (err) {
                logMsg(`CRITICAL HALT: ${err.message}`, 't-error'); await updateHud('ERROR HALTED', 'var(--error)', true);
            } finally { UI.btn.disabled = false; UI.btn.textContent = 'Restart Sequence'; }
        });
    </script>
</body>
</html>
